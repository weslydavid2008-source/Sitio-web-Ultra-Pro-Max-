<section class="productos" style="padding: 40px;">

<h1>Categorías de Productos</h1>

<div class="filtros">
    <button onclick="filtrarCategoria('')">Todos</button>
    <button onclick="filtrarCategoria('Frutas')">Frutas</button>
    <button onclick="filtrarCategoria('Carnes')">Carnes</button>
    <button onclick="filtrarCategoria('Lácteos')">Lácteos</button>
    <button onclick="filtrarCategoria('Limpieza')">Limpieza</button>
    <button onclick="filtrarCategoria('Panadería')">Panadería</button>
    <button onclick="filtrarCategoria('Granos')">Granos</button>
</div>

<div class="grid" id="productos-categoria">
    <!-- Productos se renderizan aquí dinámicamente -->
</div>

</section>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo"></h2>
        <img id="modal-imagen" src="" alt="">
        <p id="modal-descripcion"></p>
        <p id="modal-precio"></p>
        <button onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script src="js/scripts.js"></script>

<script>
function filtrarCategoria(categoria) {
    let filtrados = categoria ? productos.filter(p => p.categoria === categoria) : productos;
    renderProductos(filtrados);
}

document.addEventListener('DOMContentLoaded', () => {
    renderProductos();
    initDarkMode();
    document.getElementById('busqueda').addEventListener('input', buscarProductos);
    document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
    actualizarContadorCarrito();
});
</script>

</body>
</html>
